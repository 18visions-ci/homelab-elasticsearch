---
- name: Ensure Elasticsearch is listening on all interfaces
  lineinfile:
    path: /etc/elasticsearch/elasticsearch.yml
    regexp: '^#network.host:'
    line: 'network.host: 0.0.0.0'
  notify: Restart Elasticsearch

- name: Ensure bind_host and publish_host are set to 0.0.0.0
  lineinfile:
    path: /etc/elasticsearch/elasticsearch.yml
    regexp: '^#network.bind_host:'
    line: 'network.bind_host: 0.0.0.0'
  notify: Restart Elasticsearch

- name: Ensure publish_host is set to 0.0.0.0
  lineinfile:
    path: /etc/elasticsearch/elasticsearch.yml
    regexp: '^#network.publish_host:'
    line: 'network.publish_host: 0.0.0.0'
  notify: Restart Elasticsearch

- name: Ensure xpack.security.enabled is set to false (replace any duplicates)
  lineinfile:
    path: /etc/elasticsearch/elasticsearch.yml
    regexp: '^xpack.security.enabled:'
    line: 'xpack.security.enabled: false'
    state: present
  notify: Restart Elasticsearch

- name: Remove any duplicate or commented-out xpack.security.enabled lines
  lineinfile:
    path: /etc/elasticsearch/elasticsearch.yml
    regexp: '^#xpack.security.enabled:'
    state: absent
  notify: Restart Elasticsearch

# Installs the APM index templates (traces-apm*/metrics-apm*/logs-apm*) so the
# standalone apm-server can ingest without Fleet (Fleet needs security enabled).
- name: Ensure xpack.apm_data.enabled is set to true (APM index templates)
  lineinfile:
    path: /etc/elasticsearch/elasticsearch.yml
    regexp: '^xpack.apm_data.enabled:'
    line: 'xpack.apm_data.enabled: true'
    state: present
  notify: Restart Elasticsearch

- name: Remove any commented-out xpack.apm_data.enabled lines
  lineinfile:
    path: /etc/elasticsearch/elasticsearch.yml
    regexp: '^#xpack.apm_data.enabled:'
    state: absent
  notify: Restart Elasticsearch

- name: Increase max map count
  sysctl:
    name: vm.max_map_count
    value: 262144
    state: present
    reload: yes
